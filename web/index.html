<!DOCTYPE html>
<html lang="en">

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hydra Bin — Smart Recycling Dashboard. Sort, Score, and Save the Planet.">
  <meta name="theme-color" content="#22C55E">

  <!-- Open Graph -->
  <meta property="og:title" content="Hydra Bin">
  <meta property="og:description" content="Smart Recycling Dashboard">
  <meta property="og:type" content="website">

  <!-- iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hydra Bin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Hydra Bin</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash loader shown before Flutter boots */
    body { margin: 0; background: #0D0F1A; }
    #flutter-loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0D0F1A; z-index: 9999;
      transition: opacity 0.6s ease;
    }
    #flutter-loading.fade-out { opacity: 0; pointer-events: none; }
    .loader-grid {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, #2A2F45 1px, transparent 1px);
      background-size: 32px 32px; opacity: 0.5;
    }
    .loader-logo {
      width: 120px; height: 120px; border-radius: 24px; object-fit: cover;
      border: 2px solid rgba(34,197,94,0.3);
      box-shadow: 0 0 40px rgba(34,197,94,0.2);
      margin-bottom: 24px; position: relative;
    }
    .loader-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #F0F4FF; font-size: 26px; font-weight: 900; letter-spacing: -0.5px;
      position: relative;
    }
    .loader-sub {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #6B7280; font-size: 13px; margin-top: 6px; position: relative;
    }
    .loader-bar-wrap {
      width: 120px; height: 3px; background: #1A1D2E;
      border-radius: 4px; margin-top: 32px; position: relative; overflow: hidden;
    }
    .loader-bar {
      height: 100%; width: 0; background: linear-gradient(90deg, #22C55E, #16A34A);
      border-radius: 4px; animation: loadBar 3.6s ease forwards;
    }
    @keyframes loadBar { 0% { width: 0; } 80% { width: 90%; } 100% { width: 100%; } }
  </style>
</head>
</head>

<body style="background-color: #0D0F1A; margin: 0; overflow: hidden;">
  <script>
    // ── Service Worker Registration ─────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(reg => {
            console.log('[SW] Registered:', reg.scope);
            reg.update();
          })
          .catch(err => console.error('[SW] Registration failed:', err));
      });
    }

    // ── PWA Install Prompt Logic (Exposed to Flutter) ─────────────────────
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      // Dispatch an event so Flutter can update UI if it's already running
      window.dispatchEvent(new Event('pwa-install-available'));
    });

    window.triggerPwaInstall = async function() {
      if (!window.deferredPrompt) return false;
      window.deferredPrompt.prompt();
      const { outcome } = await window.deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        window.deferredPrompt = null;
        return true;
      }
      return false;
    };

    window.isPwaInstallable = function() {
      return window.deferredPrompt !== null;
    };

    window.addEventListener('appinstalled', () => {
      window.deferredPrompt = null;
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
